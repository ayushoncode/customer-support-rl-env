name: CustomerSupportEnv
version: "2.0.0"
description: >
  A multi-agent customer support operations environment where an agent must
  research, tag, draft, and submit policy-aware replies while handling
  escalation, frustration, and critic-memory driven self-improvement.

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  health:
    method: GET
    path: /health
  dashboard:
    method: GET
    path: /dashboard
  run_episode:
    method: POST
    path: /run_episode

observation_space:
  email:
    type: string
  history:
    type: array
  difficulty:
    type: string
  task_id:
    type: string
  order_info:
    type: object
  policy_snippet:
    type: string
  frustration_meter:
    type: number
  valid_actions:
    type: array

action_space:
  action_type:
    type: string
    enum: [RESEARCH, TAG, DRAFT, SUBMIT]
  reasoning:
    type: string
  reply:
    type: string
  order_id:
    type: string
  tag:
    type: string

reward:
  range: [-1.0, 1.0]
  components:
    - name: research
      weight: 0.1
    - name: tag
      weight: 0.1
    - name: draft
      weight: 0.15
    - name: empathy
      weight: 0.3
    - name: solution
      weight: 0.4
    - name: completeness
      weight: 0.2
    - name: personalisation
      weight: 0.1
    - name: hallucination_penalty
      weight: -0.15
    - name: policy_penalty
      weight: -0.3
    - name: qa_retry_penalty
      weight: -0.05

tasks:
  - id: easy_refund
    difficulty: easy
  - id: easy_tracking
    difficulty: easy
  - id: medium_wrong_item
    difficulty: medium
  - id: medium_billing
    difficulty: medium
  - id: hard_missing_laptop
    difficulty: hard
  - id: hard_fraud
    difficulty: hard

environment_variables:
  API_BASE_URL:
    required: false
  MODEL_NAME:
    required: false
  HF_TOKEN:
    required: false
